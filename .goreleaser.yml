version: 2

project_name: oopsie

before:
  hooks:
    - go mod tidy

builds:
  - id: oopsie
    main: ./
    binary: oopsie
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/theinventor/oopsie_exceptions-cli/cmd.Version={{.Version}}
      - -X github.com/theinventor/oopsie_exceptions-cli/cmd.Commit={{.Commit}}
      - -X github.com/theinventor/oopsie_exceptions-cli/cmd.BuildDate={{.Date}}

archives:
  - id: oopsie
    name_template: >-
      oopsie_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: theinventor
    name: oopsie_exceptions-cli
  prerelease: auto
  draft: false
